name: Build RecordMod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android64
    runs-on: ubuntu-latest

    env:
      GEODE_TARGET: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@v3
        with:
          target: Android64
          sdk: latest

      - name: Package .geode file
        run: |
          mkdir -p geode_out
          cp mod.json geode_out/
          if [ -f logo.png ]; then cp logo.png geode_out/; fi
          cp build/libRecordMod.so geode_out/dexname.recordmod.android64.so
          cd geode_out
          zip -r ../dexname.recordmod.geode .
          cd ..

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecordMod-android64
          path: dexname.recordmod.geode
