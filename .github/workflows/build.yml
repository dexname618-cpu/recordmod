name: Build RecordMod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android64
    runs-on: ubuntu-latest

    env:
      GEODE_TARGET: Android64

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          sdk: latest

      - name: Find geode file
        run: find . -name "*.geode" -o -name "*.so" | head -20

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecordMod-android64
          path: '**/*.geode'
          if-no-files-found: warn

      - name: Upload .so artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: RecordMod-android64-so
          path: '**/*.so'
